<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Body -->
  <ellipse cx="50" cy="60" rx="28" ry="32" fill="#FF6B35"/>
  <!-- Dhoti kurta pattern -->
  <ellipse cx="50" cy="70" rx="24" ry="20" fill="#FFD700" opacity="0.4"/>
  <!-- Wings -->
  <ellipse cx="22" cy="60" rx="10" ry="16" fill="#E55A25" transform="rotate(-20 22 60)"/>
  <ellipse cx="78" cy="60" rx="10" ry="16" fill="#E55A25" transform="rotate(20 78 60)"/>
  <!-- Head -->
  <circle cx="50" cy="32" r="22" fill="#FF6B35"/>
  <!-- Ear tufts -->
  <ellipse cx="34" cy="14" rx="5" ry="9" fill="#E55A25" transform="rotate(-20 34 14)"/>
  <ellipse cx="66" cy="14" rx="5" ry="9" fill="#E55A25" transform="rotate(20 66 14)"/>
  <!-- Eyes -->
  <circle cx="41" cy="32" r="9" fill="#fff"/>
  <circle cx="59" cy="32" r="9" fill="#fff"/>
  <circle cx="41" cy="33" r="5" fill="#00ACC1"/>
  <circle cx="59" cy="33" r="5" fill="#00ACC1"/>
  <circle cx="42" cy="32" r="2" fill="#111"/>
  <circle cx="60" cy="32" r="2" fill="#111"/>
  <!-- Beak -->
  <polygon points="50,38 45,44 55,44" fill="#FFD700"/>
  <!-- Book -->
  <rect x="32" y="74" width="36" height="22" rx="4" fill="#fff" opacity="0.9"/>
  <line x1="50" y1="74" x2="50" y2="96" stroke="#aaa" stroke-width="1"/>
  <rect x="36" y="78" width="12" height="2" rx="1" fill="#00ACC1"/>
  <rect x="36" y="82" width="10" height="2" rx="1" fill="#00ACC1" opacity="0.5"/>
  <rect x="52" y="78" width="12" height="2" rx="1" fill="#FF6B35"/>
  <rect x="52" y="82" width="10" height="2" rx="1" fill="#FF6B35" opacity="0.5"/>
  <!-- Star on head -->
  <text x="50" y="20" text-anchor="middle" font-size="10" fill="#FFD700">★</text>
</svg>
